<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jiayin_Medication_Record</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=SF+Pro+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-nested: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0071e3;
            --accent-green: #34c759;
            --accent-orange: #ff9500;
            --accent-red: #ff3b30;
            --accent-yellow: #ffcc00;
            --border-color: rgba(0, 0, 0, 0.05);
            --border-radius: 20px;
            --blur-val: 20px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.06);
            --ai-gradient: linear-gradient(135deg, #a8c0ff, #3f2b96, #ff8a00);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(28, 28, 30, 0.85);
                --card-nested: #1c1c1e;
                --text-primary: #f5f5f7;
                --text-secondary: #86868b;
                --border-color: rgba(255, 255, 255, 0.08);
                --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header-left p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Action Buttons Row */
        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-add {
            background-color: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }
        .btn-add:active { transform: scale(0.96); opacity: 0.9; }

        /* Siri Glowing FAB */
        .btn-ai-spark {
            background: linear-gradient(135deg, #9b51e0, #3082f6, #00f2fe);
            background-size: 200% 200%;
            animation: glowWave 4s ease infinite;
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(155, 81, 224, 0.4);
        }
        .btn-ai-spark:active { transform: scale(0.96); opacity: 0.9; }

        @keyframes glowWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* iOS-style Search Bar */
        .search-container {
            position: relative;
            width: 100%;
            padding: 0 8px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
        }

        .search-icon {
            color: var(--text-secondary);
            font-size: 15px;
            margin-right: 10px;
        }

        .search-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }

        .search-clear-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 2px 4px;
            display: none;
        }

        /* Storage Location Segment Menu */
        .location-section {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            overflow-x: auto;
            padding: 4px 8px;
            scrollbar-width: none;
        }
        .location-section::-webkit-scrollbar { display: none; }

        .location-tabs {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 14px;
            gap: 4px;
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: var(--shadow-sm);
            font-weight: 600;
        }

        @media (prefers-color-scheme: dark) {
            .tab-btn.active { background: #3a3a3c; color: #ffffff; }
        }

        .symptom-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            overflow-x: auto;
            padding: 4px 8px;
            margin-top: -8px;
            scrollbar-width: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .symptom-section::-webkit-scrollbar { display: none; }

        .symptom-pill {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }
        .symptom-pill:active { transform: scale(0.95); }

        .symptom-pill.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
            font-weight: 600;
        }

        .btn-manage-loc {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 14px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .stat-card:active {
            transform: scale(0.97);
        }

        .stat-card.active {
            border-color: var(--accent-blue);
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            .stat-card.active {
                background-color: rgba(48, 48, 50, 0.95);
                border-color: var(--accent-blue);
            }
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-card .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Medicines Grid (PC & iPad) */
        .medicine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
        }

        /* Medicine Card Design */
        .medicine-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        @media (hover: hover) {
            .medicine-card:hover { transform: translateY(-4px); }
        }

        .card-img-wrapper {
            width: 100%;
            height: 140px;
            background: var(--card-nested);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-img-placeholder { font-size: 42px; color: var(--text-secondary); opacity: 0.4; }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .type-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--card-nested);
            color: var(--text-secondary);
        }

        .location-tag-inline {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent-blue);
            background: rgba(0, 113, 227, 0.08);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .med-name { font-size: 18px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
        .effect-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

        /* Rating Stars Rendering in Card */
        .med-rating-stars {
            display: flex;
            gap: 2px;
            color: var(--accent-yellow);
            font-size: 12px;
            margin-bottom: 8px;
        }

        /* Note container inside Card */
        .med-note-box {
            background: var(--card-nested);
            border-left: 3px solid var(--accent-blue);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
            word-break: break-all;
        }

        .card-footer { border-top: 1px solid var(--border-color); padding-top: 14px; margin-top: auto; }

        .expiry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .progress-bg { height: 4px; background: var(--card-nested); border-radius: 2px; overflow: hidden; width: 100%; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .status-safe { color: var(--accent-green); }
        .status-safe .dot { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .status-warning { color: var(--accent-orange); }
        .status-warning .dot { background: var(--accent-orange); box-shadow: 0 0 6px var(--accent-orange); }
        .status-expired { color: var(--accent-red); }
        .status-expired .dot { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }

        /* Card Controls */
        .btn-delete-card, .btn-edit-card {
            position: absolute;
            top: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease;
            z-index: 2;
        }
        .btn-delete-card { right: 10px; }
        .btn-edit-card { right: 44px; }

        .medicine-card:hover .btn-delete-card,
        .btn-delete-card:focus,
        .medicine-card:hover .btn-edit-card,
        .btn-edit-card:focus { opacity: 1; }

        .btn-delete-card:hover { background: var(--accent-red); }
        .btn-edit-card:hover { background: var(--accent-blue); }

        @media (max-width: 480px) {
            .medicine-grid {
                grid-template-columns: repeat(2, 1fr); /* 手机端高密度双列 */
                gap: 10px;
            }
            .medicine-card {
                border-radius: 14px;
            }
            .card-img-wrapper {
                height: 80px; /* 极简微图 */
            }
            .card-img-placeholder {
                font-size: 28px;
            }
            .card-content {
                padding: 10px; /* 超紧凑内边距 */
            }
            .card-header-row {
                margin-bottom: 6px;
                flex-wrap: wrap;
                gap: 4px;
            }
            .type-badge, .location-tag-inline {
                font-size: 9px;
                padding: 2px 6px;
                border-radius: 8px;
            }
            .med-name {
                font-size: 14px;
                font-weight: 700;
                margin-bottom: 2px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .effect-text {
                font-size: 11px;
                margin-bottom: 6px;
                display: -webkit-box;
                -webkit-line-clamp: 1; /* 仅单行显示效果 */
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .med-rating-stars {
                font-size: 9px;
                margin-bottom: 4px;
            }
            .med-note-box {
                font-size: 10px;
                padding: 4px 6px;
                margin-bottom: 6px;
                border-left-width: 2px;
                display: -webkit-box;
                -webkit-line-clamp: 2; /* 限制备注仅展示2行，防高度失控 */
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .card-footer {
                padding-top: 6px;
            }
            .expiry-row {
                font-size: 10px;
                margin-bottom: 4px;
            }
            .btn-delete-card, .btn-edit-card {
                opacity: 0.8;
                width: 24px;
                height: 24px;
                font-size: 10px;
                top: 6px;
            }
            .btn-delete-card { right: 6px; }
            .btn-edit-card { right: 34px; }
        }

        /* Elegant Modals Framework */
        .toast-notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            pointer-events: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 16px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-sheet {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
        }
        .modal-sheet::before {
            content: '';
            width: 36px;
            height: 5px;
            background: var(--border-color);
            border-radius: 3px;
            align-self: center;
            margin-top: 10px;
            margin-bottom: 4px;
        }
        .modal-overlay.active .modal-sheet { transform: scale(1) translateY(0); }

        .modal-header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-header h2 { font-size: 19px; font-weight: 600; }

        .btn-close {
            background: var(--card-nested);
            border: none;
            color: var(--text-secondary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-secondary); padding-left: 4px; }

        .form-control-wrapper { display: flex; gap: 8px; align-items: center; }

        .form-control {
            background: var(--card-nested);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            width: 100%;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }
        .form-control:focus { border-color: var(--accent-blue); }

        /* Rating input interactive styles */
        .rating-input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 24px;
            color: var(--text-secondary);
        }
        .star-input {
            cursor: pointer;
            transition: transform 0.15s ease, color 0.15s ease;
        }
        .star-input.active {
            color: var(--accent-yellow);
        }
        .star-input:active {
            transform: scale(0.85);
        }

        .btn-form-gear {
            background: var(--card-nested);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .btn-form-gear:active { transform: scale(0.95); }

        /* Photo Uploader Utilities */
        .photo-uploader {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: var(--card-nested);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .photo-uploader:hover { border-color: var(--accent-blue); background: rgba(0, 113, 227, 0.02); }
        .photo-uploader input[type="file"] { display: none; }

        .uploader-preview { width: 100%; height: 160px; border-radius: 10px; overflow: hidden; display: none; position: relative; }
        .uploader-preview img { width: 100%; height: 100%; object-fit: cover; }
        .uploader-preview .btn-remove-photo {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #ffffff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        /* Location Manager List */
        .location-manager-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 12px;
            background: var(--card-nested);
        }

        .location-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .location-item span { font-size: 14px; font-weight: 500; }
        .btn-delete-loc { background: transparent; border: none; color: var(--accent-red); cursor: pointer; font-size: 14px; padding: 4px; }

        .modal-footer { padding: 16px 24px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; }

        .btn-secondary {
            background: var(--card-nested);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s ease;
        }
        .btn-primary {
            background: var(--accent-blue);
            border: none;
            color: #ffffff;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.2s ease;
        }
        .btn-primary:active, .btn-secondary:active { opacity: 0.8; }

        .empty-state {
            grid-column: 1 / -1;

        // --- 2. EXPIRY HELPER LOGIC ---
        function getExpiryStatus(expiryStr) {
            if (!expiryStr) return { label: "无日期", color: "var(--text-secondary)", statusClass: "status-safe", percent: 100 };
            const [year, month] = expiryStr.split('-').map(Number);
            const remainingMonths = (year - currentYear) * 12 + (month - currentMonth);

            if (remainingMonths < 0) {
                return { label: "已过期", color: "var(--accent-red)", statusClass: "status-expired", percent: 0 };
            } else if (remainingMonths <= 3) {
                const percent = Math.max(10, (remainingMonths / 12) * 100);
                return { label: "临近过期", color: "var(--accent-orange)", statusClass: "status-warning", percent: percent };
            } else {
                const percent = Math.min(100, (remainingMonths / 24) * 100);
                return { label: "安全在保", color: "var(--accent-green)", statusClass: "status-safe", percent: percent };
            }
        }

            "其他": "fa-prescription-bottle"
        };

        function getIconForType(type) {
            if (!type) return "fa-prescription-bottle";
            for (let key in iconMap) {
                if (type.includes(key)) return iconMap[key];
            }
            return "fa-prescription-bottle";

        function getFilteredMedicines() {
            let list = state.medicines;

            if (currentFilterLocation !== "全部") {
                list = list.filter(m => m.location === currentFilterLocation);
            }

            if (currentFilterSymptom !== "全部") {
                const targetCategory = symptomCategories.find(c => c.key === currentFilterSymptom);
                if (targetCategory) {
                    list = list.filter(med => {
                        const searchString = ((med.name || "") + " " + (med.effect || "")).toLowerCase();
                        return targetCategory.keywords.some(kw => searchString.includes(kw.toLowerCase()));
                    });
                }
            }

            // 1.5 Filter by dynamic stats cards
            if (currentFilterStat !== "全部") {
                list = list.filter(med => {
                    const status = getExpiryStatus(med.expiry);
                    if (currentFilterStat === "即将过期") {
                        return status.statusClass === 'status-warning' || status.statusClass === 'status-expired';
                    } else if (currentFilterStat === "安全在保") {
                        return status.statusClass === 'status-safe';
                    }
                    return true;
                });
            }

            if (currentSearchQuery.trim() !== "") {
                const keywords = currentSearchQuery.toLowerCase().trim().split(/\s+/);
                list = list.filter(med => {
                    return keywords.every(kw => {
                        // Check if rating number is searched (e.g. "5星", "5 star", "5")
                        const isRatingSearch = kw.includes("星") || kw.includes("star");
                        const cleanKw = kw.replace(/[星star]/g, "").trim();
                        const ratingMatch = (isRatingSearch && cleanKw && med.rating && med.rating.toString() === cleanKw) || 
                                            (!isRatingSearch && med.rating && med.rating.toString() === kw);

                        return (med.name && med.name.toLowerCase().includes(kw)) ||
                               (med.effect && med.effect.toLowerCase().includes(kw)) ||
                               (med.type && med.type.toLowerCase().includes(kw)) ||
                               (med.location && med.location.toLowerCase().includes(kw)) ||
                               (med.notes && med.notes.toLowerCase().includes(kw)) ||
                               ratingMatch;
                    });
                });
            }

            return list;
        }

        function renderStatistics(filteredMeds) {
            // ALWAYS calculate statistics based on the full subset matching the Location & Symptom to reflect exact box stats
            let listForStats = state.medicines;
            if (currentFilterLocation !== "全部") {
                listForStats = listForStats.filter(m => m.location === currentFilterLocation);
            }
            if (currentFilterSymptom !== "全部") {
                const targetCategory = symptomCategories.find(c => c.key === currentFilterSymptom);
                if (targetCategory) {
                    listForStats = listForStats.filter(med => {
                        const searchString = ((med.name || "") + " " + (med.effect || "")).toLowerCase();
                        return targetCategory.keywords.some(kw => searchString.includes(kw.toLowerCase()));
                    });
                }
            }

            let total = listForStats.length;
            let warning = 0;
            let safe = 0;

            listForStats.forEach(med => {
                const status = getExpiryStatus(med.expiry);
                if (status.statusClass === 'status-warning' || status.statusClass === 'status-expired') {
                    warning++;
                } else {
                    safe++;
                }
            });

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-warning').innerText = warning;
            document.getElementById('stat-safe').innerText = safe;
        }

        // --- 4.5 EXPIRED/EXPIRING MONITOR DIALOG SENSING ---
        function checkExpiryAlerts() {
            const container = document.getElementById('expiry-alert-list');
            container.innerHTML = '';
            let riskCount = 0;

            state.medicines.forEach(med => {
                if (!med.expiry) return;
                const [year, month] = med.expiry.split('-').map(Number);
                const remainingMonths = (year - currentYear) * 12 + (month - currentMonth);

                let label = "";
                let itemClass = "alert-item-row";
                let badgeStyle = "color: var(--accent-red); background: rgba(255,59,48,0.1);";

                if (remainingMonths < 0) {
                    label = "已过期";
                } else if (remainingMonths === 0) {
                    label = "本月到期";
                    itemClass = "alert-item-row warning";
                    badgeStyle = "color: var(--accent-orange); background: rgba(255,149,0,0.1);";
                } else if (remainingMonths === 1) {
                    label = "到期前一个月";
                    itemClass = "alert-item-row warning";
                    badgeStyle = "color: var(--accent-orange); background: rgba(255,149,0,0.1);";
                }

                if (label) {
                    riskCount++;
                    const row = document.createElement('div');
                    row.className = itemClass;
                    row.innerHTML = `
                        <div class="alert-item-info">
                            <h4>${med.name}</h4>
                            <p><i class="fa-solid fa-location-dot"></i> ${med.location || "未分类"}</p>
                        </div>
                        <span class="ai-safety-alert" style="${badgeStyle}">${label}</span>
                    `;
                    container.appendChild(row);
                }
            });

            if (riskCount > 0) {
                setTimeout(() => {
                    openModal('expiry-alert-modal');
                }, 800); // Gentle lag launch for sleek Apple style
            }
        }

        window.deleteParameter = function(val) {
            if (currentManageTab === "location") {
                showConfirm(
                    '确认删除位置吗？',
                    `在“${val}”的药品将被重新归入“未分类”位置中。`,
                    () => {
                        state.locations = state.locations.filter(l => l !== val);
                        state.medicines.forEach(med => { if (med.location === val) med.location = "未分类"; });
                        if (!state.locations.includes("未分类")) state.locations.push("未分类");
                        if (currentFilterLocation === val) currentFilterLocation = "全部";
                        
                        saveStateToLocal();
                        refreshUI();
                        renderParamsList();
                        showToast('存放位置已移除');
                    }
                );
            } else {
                showConfirm(
                    '确认删除性状吗？',
                    `性状为“${val}”的药品将被重新标记为“其他”。`,
                    () => {
                        state.types = state.types.filter(t => t !== val);
                        state.medicines.forEach(med => { if (med.type === val) med.type = "其他"; });
                        if (!state.types.includes("其他")) state.types.push("其他");
                        
                        saveStateToLocal();
                        refreshUI();
                        renderParamsList();
                        showToast('药品性状已从系统移除');
                    }
                );
            }
        };

        window.deleteMedicine = function(medId) {
            showConfirm(
                '移出药箱吗？',
                '确认要在您的药箱中移除该药品吗？该操作无法撤销。',
                () => {
                    state.medicines = state.medicines.filter(m => m.id !== medId);
                    saveStateToLocal();
                    refreshUI();
                    showToast('药品信息已被移除');
                }
            );
        };

        // Interactive Star Rating Logic in Form
        const starElements = document.querySelectorAll('.star-input');
        const ratingClearBtn = document.getElementById('rating-clear-btn');

        starElements.forEach(star => {
            star.onclick = () => {
                const val = parseInt(star.getAttribute('data-value'));
                setFormRatingState(val);
            };
        });

        ratingClearBtn.onclick = () => {
            setFormRatingState(0);
        };

        function setFormRatingState(ratingVal) {
            tempSelectedRating = ratingVal;
            starElements.forEach(star => {
                const starVal = parseInt(star.getAttribute('data-value'));
                if (starVal <= ratingVal) {
                    star.classList.add('active');
                    star.innerHTML = '<i class="fa-solid fa-star"></i>';
                } else {
                    star.classList.remove('active');
                    star.innerHTML = '<i class="fa-regular fa-star"></i>';
                }
            });

            if (ratingVal > 0) {
                ratingClearBtn.style.display = 'inline-block';
            } else {
                ratingClearBtn.style.display = 'none';
            }
        }

        window.editMedicine = function(medId) {
            const med = state.medicines.find(m => m.id === medId);
            if (!med) return;

            editingMedId = medId;
            document.getElementById('modal-title-text').innerText = '修改药品信息';

            document.getElementById('med-name-input').value = med.name;
            document.getElementById('med-type-input').value = med.type || '其他';
            document.getElementById('med-effect-input').value = med.effect || '';
            document.getElementById('med-expiry-input').value = med.expiry || '';
            document.getElementById('med-location-input').value = med.location || '未分类';
            
            // Prefill Notes & Rating
            document.getElementById('med-notes-input').value = med.notes || '';
            setFormRatingState(med.rating || 0);

            const fileTrigger = document.getElementById('photo-uploader-trigger');
            const previewBox = document.getElementById('photo-preview-box');
            const previewImg = document.getElementById('photo-preview-img');

            if (med.photo) {
                uploadedImageBase64 = med.photo;
                previewImg.src = med.photo;
                previewBox.style.display = 'block';
                fileTrigger.style.display = 'none';
            } else {
                uploadedImageBase64 = null;
                previewBox.style.display = 'none';
                fileTrigger.style.display = 'flex';
                fileInput.value = '';
            }

            openModal('add-medicine-modal');
        };

        // File Uploader System
        const fileTrigger = document.getElementById('photo-uploader-trigger');
        const fileInput = document.getElementById('med-photo-input');
        const previewBox = document.getElementById('photo-preview-box');
        const previewImg = document.getElementById('photo-preview-img');
        const removePhotoBtn = document.getElementById('btn-remove-photo');

        fileTrigger.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const maxDim = 600;
                        let w = img.width;
                        let h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
                            else { w = Math.round((w * maxDim) / h); h = maxDim; }
                        }
                        
                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        uploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        previewImg.src = uploadedImageBase64;
                        previewBox.style.display = 'block';
                        fileTrigger.style.display = 'none';
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        removePhotoBtn.onclick = () => {
            uploadedImageBase64 = null;
            fileInput.value = '';
            previewBox.style.display = 'none';
            fileTrigger.style.display = 'flex';
        };

        document.getElementById('btn-save-medicine').onclick = () => {
            const name = document.getElementById('med-name-input').value.trim();
            const type = document.getElementById('med-type-input').value;
            const effect = document.getElementById('med-effect-input').value.trim();
            const expiry = document.getElementById('med-expiry-input').value;
            const location = document.getElementById('med-location-input').value;
            const notes = document.getElementById('med-notes-input').value.trim();
            const rating = tempSelectedRating;

            if (!name) { showToast('请填写药品名称'); return; }
            if (!expiry) { showToast('请选择保质期/有效期'); return; }

            if (editingMedId) {
                const index = state.medicines.findIndex(m => m.id === editingMedId);
                if (index !== -1) {
                    state.medicines[index] = {
                        ...state.medicines[index],
                        name, type, effect, expiry, location, notes, rating,
                        photo: uploadedImageBase64
                    };
                    showToast('药品信息已修改');
                }
                editingMedId = null;
            } else {
                const newMedicine = {
                    id: Date.now().toString(),
                    name, type, effect, expiry, location, notes, rating,
                    photo: uploadedImageBase64
                };
                state.medicines.unshift(newMedicine);
                showToast('新药品已入库');
            }

            saveStateToLocal();
            closeModal('add-medicine-modal');
            refreshUI();

            // Clear state and fields
            document.getElementById('med-name-input').value = '';
            document.getElementById('med-effect-input').value = '';
            document.getElementById('med-expiry-input').value = '';
            document.getElementById('med-notes-input').value = '';
            setFormRatingState(0);
            uploadedImageBase64 = null;
            previewBox.style.display = 'none';
            fileTrigger.style.display = 'flex';
            fileInput.value = '';
        };

        // --- 6. AI ASSISTANT CLINICAL LOGIC ---

        const symptomDictionary = {
            "感冒": ["感冒", "发热", "发烧", "头痛", "鼻塞", "流涕", "打喷嚏", "咳嗽", "咳", "祛痰", "退烧", "冷", "寒", "柴胡", "999", "退热"],
            "消炎": ["消炎", "阿莫西林", "头孢", "头孢拉丁", "发炎", "细菌", "抗生素", "红肿"],
            "过敏": ["过敏", "红疹", "荨麻疹", "依巴斯汀", "抗组胺", "痒"],
            "痤疮": ["痤疮", "痘", "米诺环素", "多西环素", "青春痘", "粉刺"],
            "止痛": ["痛", "头痛", "牙痛", "关节痛", "痛经", "艾瑞昔布", "消炎镇痛"],
            "疱疹": ["疱疹", "阿昔洛韦", "单纯疱疹", "病毒"],
            "肠胃": ["拉肚子", "腹泻", "胀气", "胃", "肠", "整肠生", "肚子疼", "稀", "菌群"]
        };

        document.getElementById('btn-open-ai').onclick = () => {
            openModal('ai-assistant-overlay');
        };

        window.askAIPreset = function(presetText) {
            document.getElementById('ai-user-input').value = presetText;
            triggerAISubmit();
        };

        document.getElementById('btn-send-ai-query').onclick = triggerAISubmit;
        document.getElementById('ai-user-input').onkeydown = (e) => {
            if (e.key === 'Enter') triggerAISubmit();
        };

        function triggerAISubmit() {
            const inputField = document.getElementById('ai-user-input');
            const query = inputField.value.trim();
            if (!query) return;

            document.getElementById('ai-presets-box').style.display = 'none';
            document.getElementById('ai-init-msg').style.display = 'none';
            
            const logContainer = document.getElementById('ai-conversation-log');
            logContainer.style.display = 'flex';

            const userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble user';
            userMsg.innerText = query;
            logContainer.appendChild(userMsg);
            
            inputField.value = '';
            scrollAIChatToBottom();

            const aiLoadingMsg = document.createElement('div');
            aiLoadingMsg.className = 'chat-bubble ai';
            aiLoadingMsg.innerHTML = `
                <div style="font-size:12px; color:var(--text-secondary); margin-bottom:4px;">JunCheng正在分析症状和药箱...</div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            logContainer.appendChild(aiLoadingMsg);
            scrollAIChatToBottom();

            setTimeout(() => {
                const responseData = generateLocalAIReport(query);
                aiLoadingMsg.innerHTML = responseData;
                scrollAIChatToBottom();
            }, 1200);
        }

        function generateLocalAIReport(userQuery) {
            const queryLower = userQuery.toLowerCase();
            let identifiedSymptoms = [];
            let matchedMeds = [];

            for (let category in symptomDictionary) {
                const keywords = symptomDictionary[category];
                if (keywords.some(kw => queryLower.includes(kw))) {
                    identifiedSymptoms.push(category);
                }
            }

            if (identifiedSymptoms.length === 0) {
                identifiedSymptoms = ["通用匹配"];
            }

            state.medicines.forEach(med => {
                let score = 0;
                const medName = (med.name || "").toLowerCase();
                const medEffect = (med.effect || "").toLowerCase();
                const medType = (med.type || "").toLowerCase();
                const medNotes = (med.notes || "").toLowerCase();

                identifiedSymptoms.forEach(symptom => {
                    if (symptom !== "通用匹配" && symptomDictionary[symptom]) {
                        symptomDictionary[symptom].forEach(alias => {
                            if (medName.includes(alias) || medEffect.includes(alias) || medNotes.includes(alias)) {
                                score += 3;
                            }
                        });
                    }
                });

                if (queryLower.includes(medName) || medEffect.split(/[,，、\s]/).some(eff => eff && queryLower.includes(eff))) {
                    score += 5;
                }

                if (score > 0) {
                    matchedMeds.push({ med, score });
                }
            });

            matchedMeds.sort((a, b) => b.score - a.score);

            let reportHtml = ``;
            
            if (identifiedSymptoms.includes("通用匹配") && matchedMeds.length === 0) {
                reportHtml += `
                    <div style="font-weight:600; color:var(--accent-orange);"><i class="fa-solid fa-triangle-exclamation"></i> 抱歉，未能识别到您的症状</div>
                    <p style="margin-top:6px; font-size:13px; color:var(--text-secondary);">我没能在您的药箱中找到与您的描述相匹配的药。建议您在主页通过【搜索框】直接模糊检索，或直接去正规药店咨询专业医生。</p>
                `;
            } else {
                reportHtml += `
                    <div style="font-weight:600; color:#9b51e0;"><i class="fa-solid fa-circle-check"></i> 诊断分析报告</div>
                    <p style="margin-top:4px; font-size:13px;">分析您的诉求，JunCheng为您在药箱中筛选出以下<b>对症存药</b>：</p>
                    
                    <div class="ai-report-section">
                `;

                if (matchedMeds.length === 0) {
                    reportHtml += `
                        <p style="font-size:13px; color:var(--text-secondary);"><i class="fa-solid fa-box-open"></i> 当前药箱里<b>暂无</b>直接对症的有效药，建议您及时去实体药店采购相关抗感冒/消炎类的药物。</p>
                    `;
                } else {
                    matchedMeds.forEach(item => {
                        const m = item.med;
                        const status = getExpiryStatus(m.expiry);
                        
                        let warningTag = "";
                        if (status.statusClass === 'status-expired') {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(255,59,48,0.1); color:var(--accent-red);"><i class="fa-solid fa-ban"></i> 严禁服用（已过期）</span>`;
                        } else if (status.statusClass === 'status-warning') {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(255,149,0,0.1); color:var(--accent-orange);"><i class="fa-solid fa-clock"></i> 临近过期（尽快用）</span>`;
                        } else {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(52,199,89,0.1); color:var(--accent-green);"><i class="fa-solid fa-shield-halved"></i> 安全在保</span>`;
                        }

                        // Rating info display inside AI panel
                        let aiRatingString = '';
                        if (m.rating && m.rating > 0) {
                            aiRatingString = ` | 个人评分：<b>${'⭐'.repeat(m.rating)}</b>`;
                        }

                        // Notes display inside AI panel
                        let aiNotesBlock = '';
                        if (m.notes && m.notes.trim() !== "") {
                            aiNotesBlock = `<p style="margin-top: 4px; font-size:11px; color:#9b51e0; background:rgba(155, 81, 224, 0.05); padding: 4px 8px; border-radius: 4px;"><b>💡 个人备注：</b>${m.notes}</p>`;
                        }

                        reportHtml += `
                            <div class="ai-med-recommend" style="display:block;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div class="ai-med-info">
                                        <h4>${m.name}</h4>
                                        <p><i class="fa-solid fa-location-dot"></i> 存放在：<b>${m.location}</b>${aiRatingString}</p>
                                    </div>
                                    <div>${warningTag}</div>
                                </div>
                                ${aiNotesBlock}
                            </div>
                        `;
                    });
                }

                reportHtml += `
                    </div>
                    <div style="margin-top:12px; font-size:11px; color:var(--text-secondary); line-height:1.4; border-top:1px solid var(--border-color); padding-top:10px;">
                        <i class="fa-solid fa-circle-info"></i> <b>用药提醒：</b>
                        消炎药与中药感冒冲剂请勿随意叠加。服用前请仔细核对包装说明书中的剂量。若症状持续超过24小时未缓解，请立刻前往医院就诊。
                    </div>
                `;
            }

            return reportHtml;
        }

        function scrollAIChatToBottom() {
            const chatBody = document.getElementById('ai-chat-body');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // --- 7. MODAL UTILITY TRIGGERS ---
        window.openModal = function(id) { document.getElementById(id).classList.add('active'); };
        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };

        document.getElementById('btn-open-add-modal').onclick = () => {
            editingMedId = null;
            document.getElementById('modal-title-text').innerText = '添加药品信息';
            
            document.getElementById('med-name-input').value = '';
            document.getElementById('med-effect-input').value = '';
            document.getElementById('med-expiry-input').value = '';
            document.getElementById('med-notes-input').value = '';
            setFormRatingState(0);
            uploadedImageBase64 = null;
            previewBox.style.display = 'none';
            fileTrigger.style.display = 'flex';
            fileInput.value = '';

            openModal('add-medicine-modal');
        };

        document.getElementById('btn-open-param-modal').onclick = () => {
            renderParamsList();
            openModal('manage-parameters-modal');
        };

        // Window onload initialization
        window.onload = function() {
            checkExpiryAlerts();
        };

        refreshUI();
    </script>
</body>
</html>
