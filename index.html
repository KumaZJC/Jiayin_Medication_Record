<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jiayin's Medication Record</title>
    <!-- 引入高级系统字体与矢量图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=SF+Pro+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: rgba(22, 22, 24, 0.85);
            --card-nested: rgba(255, 255, 255, 0.04);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent-blue: #0071e3;
            --accent-green: #30d158;
            --accent-orange: #ff9f0a;
            --accent-red: #ff453a;
            --accent-yellow: #ffd60a;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-radius: 16px;
            --blur-val: 20px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.3);
            --ai-gradient: linear-gradient(135deg, #bf5af2, #0a84ff, #5e5ce6);
        }

        /* 浅色模式系统自适应 */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f5f5f7;
                --card-bg: rgba(255, 255, 255, 0.9);
                --card-nested: rgba(0, 0, 0, 0.03);
                --text-primary: #1d1d1f;
                --text-secondary: #86868b;
                --border-color: rgba(0, 0, 0, 0.05);
                --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.04);
                --accent-blue: #0071e3;
                --accent-green: #34c759;
                --accent-orange: #ff9500;
                --accent-red: #ff3b30;
                --accent-yellow: #ffcc00;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 12px;
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px 4px;
        }

        .header-left h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .header-left p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-add {
            background-color: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.25);
        }
        .btn-add:active { transform: scale(0.96); opacity: 0.9; }

        .btn-archive {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        .btn-archive.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }
        .btn-archive:active { transform: scale(0.96); opacity: 0.9; }

        .btn-ai-spark {
            background: linear-gradient(135deg, #a8c0ff, #3f2b96, #ff8a00);
            background: var(--ai-gradient);
            background-size: 200% 200%;
            animation: glowWave 4s ease infinite;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(94, 92, 230, 0.3);
        }
        .btn-ai-spark:active { transform: scale(0.96); opacity: 0.9; }

        @keyframes glowWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            box-shadow: var(--shadow-sm);
        }

        .search-icon {
            color: var(--text-secondary);
            font-size: 14px;
            margin-right: 8px;
        }

        .search-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }

        .search-clear-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px;
            display: none;
        }

        .location-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .location-section::-webkit-scrollbar { display: none; }

        .location-tabs {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3px;
            border-radius: 12px;
            gap: 2px;
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 6px 12px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            font-weight: 600;
        }

        @media (prefers-color-scheme: light) {
            .tab-btn.active { background: #ffffff; color: #000000; box-shadow: var(--shadow-sm); }
        }

        /* 二级症状胶囊 */
        .symptom-section {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .symptom-section::-webkit-scrollbar { display: none; }

        .symptom-pill {
            padding: 5px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .symptom-pill.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
            font-weight: 600;
        }

        .btn-manage-loc {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .stat-card:active { transform: scale(0.97); }

        .stat-card.active {
            border-color: var(--accent-blue);
            background-color: rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 10px rgba(0, 113, 227, 0.05);
        }

        @media (prefers-color-scheme: light) {
            .stat-card.active {
                background-color: rgba(255, 255, 255, 1);
                box-shadow: 0 4px 16px rgba(0, 113, 227, 0.08);
            }
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 1px;
        }

        .stat-card .label {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .medicine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        /* 重构卡片：去除粗笨的外框层级 */
        .medicine-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            position: relative;
            padding: 14px;
            gap: 10px;
            transition: transform 0.2s ease;
        }

        /* 极致紧凑顶部图幅（有照片时才渲染） */
        .card-img-mini {
            width: 100%;
            height: 90px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 2px;
        }
        .card-img-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 卡片头部行（精美的小图标徽章） */
        .card-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        /* iOS 设置式微章图标 */
        .icon-badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(0, 113, 227, 0.12);
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .tag-row {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .type-badge-mini {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 6px;
            background: var(--card-nested);
            color: var(--text-secondary);
        }

        .loc-tag-mini {
            font-size: 9px;
            font-weight: 600;
            color: var(--accent-blue);
            background: rgba(0, 113, 227, 0.08);
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .med-title-row {
            margin-top: 1px;
        }

        .med-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--text-primary);
        }
        .effect-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            line-height: 1.3;
        }

        /* 星星评分微型化 */
        .med-rating-stars {
            display: flex;
            gap: 1px;
            color: var(--accent-yellow);
            font-size: 9px;
            margin-top: 4px;
        }

        /* 重构备注栏：取消灰框，改成优雅的引用边线 */
        .med-note-quote {
            border-left: 2px solid var(--accent-blue);
            padding-left: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.35;
            font-style: italic;
        }

        /* 底部边缘生命线（有效期进度条） */
        .expiry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding-top: 4px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* 绝对贴合卡片底部的超细进度条 */
        .card-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: transparent;
            overflow: hidden;
        }
        .card-progress-fill {
            height: 100%;
            transition: width 0.4s ease;
        }

        /* 微型控制按钮（在右上角低调呈现） */
        .card-actions-wrapper {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
            opacity: 0.2; /* 默认隐形透明 */
            transition: opacity 0.2s ease;
            z-index: 5;
        }

        .medicine-card:hover .card-actions-wrapper,
        .card-actions-wrapper:focus-within {
            opacity: 1; /* 指针悬停时浮现 */
        }

        .btn-card-micro {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 9px;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        @media (prefers-color-scheme: light) {
            .btn-card-micro {
                background: rgba(0, 0, 0, 0.05);
                border-color: rgba(0, 0, 0, 0.05);
                color: #000000;
            }
        }
        .btn-card-micro:hover { transform: scale(1.1); }
        .btn-card-micro.del:hover { background: var(--accent-red); color: white; }
        .btn-card-micro.edit:hover { background: var(--accent-blue); color: white; }
        .btn-card-micro.archive:hover { background: var(--accent-orange); color: white; }

        /* 手机端 2 列高密度紧凑重构（核心提效） */
        @media (max-width: 480px) {
            .medicine-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .medicine-card {
                padding: 10px;
                gap: 6px;
                border-radius: 12px;
            }
            .card-actions-wrapper {
                opacity: 0.8; /* 手机上始终保持一定程度可见 */
                top: 6px;
                right: 6px;
            }
            .med-name { font-size: 13px; }
            .effect-text { font-size: 10px; line-height: 1.25; }
            .med-note-quote { font-size: 10px; line-height: 1.25; }
            .expiry-row { font-size: 9px; }
            .status-badge { font-size: 9px; }
            .card-img-mini { height: 64px; border-radius: 8px; }
            .icon-badge { width: 24px; height: 24px; border-radius: 6px; font-size: 11px; }
        }

        .archive-banner-style {
            background: rgba(0, 113, 227, 0.08);
            border-left: 3px solid var(--accent-blue);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.4;
            color: var(--text-primary);
        }

        /* 弹窗样式高阶美化 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 12px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-sheet {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
        }
        .modal-overlay.active .modal-sheet { transform: scale(1) translateY(0); }

        .modal-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-header h2 { font-size: 16px; font-weight: 600; }

        .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding-left: 2px; }

        .form-control-wrapper { display: flex; gap: 6px; align-items: center; }
        .form-control {
            background: var(--card-nested);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .rating-input-wrapper { display: flex; align-items: center; gap: 4px; font-size: 20px; color: var(--text-secondary); }
        .star-input { cursor: pointer; transition: transform 0.15s ease, color 0.15s ease; }
        .star-input.active { color: var(--accent-yellow); }

        /* AI Side panel drawer */
        .ai-panel-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 150;
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .ai-panel-overlay.active { opacity: 1; pointer-events: auto; }

        .ai-sidebar {
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
        }
        .ai-panel-overlay.active .ai-sidebar { transform: translateX(0); }

        .ai-header {
            background: linear-gradient(135deg, rgba(191, 90, 242, 0.08), rgba(10, 132, 255, 0.08));
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .ai-header-title { display: flex; align-items: center; gap: 8px; }
        .ai-header-title h2 {
            font-size: 16px;
            font-weight: 700;
            background: var(--ai-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ai-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

        .ai-chip {
            background: var(--card-nested);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ai-chip:hover { border-color: var(--accent-blue); background: rgba(0, 113, 227, 0.05); }

        .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.45; }
        .chat-bubble.user { background: var(--accent-blue); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-bubble.ai {
            background: var(--card-nested);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
            width: 100%;
        }

        .ai-med-recommend {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 6px;
        }

        .ai-footer { padding: 12px 20px 20px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; align-items: center; }

        @media (max-width: 480px) {
            .ai-sidebar { height: 80vh; border-top-left-radius: 20px; border-top-right-radius: 20px; transform: translateY(100%); }
            .ai-panel-overlay { align-items: flex-end; }
            .ai-panel-overlay.active .ai-sidebar { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>JiaYin的智能药箱</h1>
                <p>宝贝，要健健康康的哦！</p>
            </div>
            <div class="header-actions">
                <button class="btn-ai-spark" id="btn-open-ai">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> JunCheng医生
                </button>
                <button class="btn-archive" id="btn-open-archive" title="查看已丢弃药品的归档历史">
                    <i class="fa-solid fa-box-archive"></i> 归档箱
                </button>
                <button class="btn-add" id="btn-open-add-modal">
                    <i class="fa-solid fa-plus"></i> 新增
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <section class="search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>

            { id: "4", name: "盐酸多西环素肠溶胶囊", type: "胶囊", effect: "痤疮、消炎", expiry: "2028-08", location: "家里", photo: null, notes: "防晒注意，遵医嘱口服", rating: 5, discarded: false },
            { id: "5", name: "依巴斯汀片", type: "片剂", effect: "抗过敏、荨麻疹", expiry: "2027-12", location: "家里", photo: null, notes: "每天睡前吃一粒，吃了会有睡意", rating: 5, discarded: false },

            localStorage.setItem('med_list', JSON.stringify(state.medicines));
            localStorage.setItem('loc_list', JSON.stringify(state.locations));
            localStorage.setItem('type_list', JSON.stringify(state.types));

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => { toast.classList.remove('active'); }, 2500);
        }

        function showConfirm(title, message, onConfirm, onCancel) {
            const dialog = document.getElementById('custom-dialog-modal');
            const titleEl = document.getElementById('dialog-title');
            const msgEl = document.getElementById('dialog-message');
            const confirmBtn = document.getElementById('dialog-confirm-btn');
            const cancelBtn = document.getElementById('dialog-cancel-btn');

            titleEl.innerText = title;
            msgEl.innerText = message;
            dialog.classList.add('active');

            confirmBtn.onclick = () => {
                dialog.classList.remove('active');
                if (onConfirm) onConfirm();
            };
            cancelBtn.onclick = () => {
                dialog.classList.remove('active');
                if (onCancel) onCancel();
            };
        }

        function getExpiryStatus(expiryStr, isDiscarded) {
            if (isDiscarded) {
                return { label: "已丢弃归档", color: "var(--text-secondary)", statusClass: "status-discarded", percent: 0 };
            }
            if (!expiryStr) return { label: "无日期", color: "var(--text-secondary)", statusClass: "status-safe", percent: 100 };
            const [year, month] = expiryStr.split('-').map(Number);
            const remainingMonths = (year - currentYear) * 12 + (month - currentMonth);

            if (remainingMonths < 0) {
                return { label: "已过期", color: "var(--accent-red)", statusClass: "status-expired", percent: 0 };
            } else if (remainingMonths <= 3) {
                const percent = Math.max(10, (remainingMonths / 12) * 100);
                return { label: "临近过期", color: "var(--accent-orange)", statusClass: "status-warning", percent: percent };
            } else {
                const percent = Math.min(100, (remainingMonths / 24) * 100);
                return { label: "安全在保", color: "var(--accent-green)", statusClass: "status-safe", percent: percent };
            }
        }

            "喷雾": "fa-spray-can",
            "颗粒/冲剂": "fa-mortar-pestle", "冲剂": "fa-mortar-pestle", "颗粒": "fa-mortar-pestle",
            "液体/药水": "fa-prescription-bottle-medical", "药水": "fa-prescription-bottle-medical", "液体": "fa-prescription-bottle-medical",
            "其他": "fa-prescription-bottle"
        };

        function getIconForType(type) {
            if (!type) return "fa-prescription-bottle";
            for (let key in iconMap) {
                if (type.includes(key)) return iconMap[key];
            }
            return "fa-prescription-bottle";
        }

        function renderLocationsUI() {
            const tabsContainer = document.getElementById('location-tabs-container');
            const locSelect = document.getElementById('med-location-input');
            const typeSelect = document.getElementById('med-type-input');

            tabsContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `tab-btn ${currentFilterLocation === '全部' ? 'active' : ''}`;
            allBtn.innerText = '全部';
            allBtn.onclick = () => filterByLocation('全部');
            tabsContainer.appendChild(allBtn);

            state.locations.forEach(loc => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${currentFilterLocation === loc ? 'active' : ''}`;
                btn.innerText = loc;
                btn.onclick = () => filterByLocation(loc);
                tabsContainer.appendChild(btn);
            });

            locSelect.innerHTML = '';
            state.locations.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc; option.innerText = loc;
                locSelect.appendChild(option);
            });

            typeSelect.innerHTML = '';
            state.types.forEach(t => {
                const option = document.createElement('option');
                option.value = t; option.innerText = t;
                typeSelect.appendChild(option);
            });
        }

        function renderSymptomFilterRow() {
            const container = document.getElementById('symptom-section-container');
            container.innerHTML = '';

            let medsInLocation = state.medicines.filter(m => !m.discarded);
            if (currentFilterLocation !== "全部") {
                medsInLocation = state.medicines.filter(m => m.location === currentFilterLocation && !m.discarded);
            }

        function getFilteredMedicines() {
            let list = state.medicines;

            if (currentFilterLocation === "已丢弃归档") {
                list = list.filter(m => m.discarded);
            } else {
                list = list.filter(m => !m.discarded);
                if (currentFilterLocation !== "全部") {
                    list = list.filter(m => m.location === currentFilterLocation);
                }
            }

            if (currentFilterSymptom !== "全部" && currentFilterLocation !== "已丢弃归档") {
                const targetCategory = symptomCategories.find(c => c.key === currentFilterSymptom);
                if (targetCategory) {
                    list = list.filter(med => {
                        const searchString = ((med.name || "") + " " + (med.effect || "")).toLowerCase();
                        return targetCategory.keywords.some(kw => searchString.includes(kw.toLowerCase()));
                    });
                }
            }

            if (currentFilterStat !== "全部") {
                list = list.filter(med => {
                    const status = getExpiryStatus(med.expiry, med.discarded);
                    if (currentFilterStat === "已过期") {
                        return status.statusClass === 'status-expired';
                    } else if (currentFilterStat === "即将过期") {
                        return status.statusClass === 'status-warning';
                    }
                    return true;
                });
            }

            if (currentSearchQuery.trim() !== "") {
                const keywords = currentSearchQuery.toLowerCase().trim().split(/\s+/);
                list = list.filter(med => {
                    return keywords.every(kw => {
                        const isRatingSearch = kw.includes("星") || kw.includes("star");
                        const cleanKw = kw.replace(/[星star]/g, "").trim();
                        const ratingMatch = (isRatingSearch && cleanKw && med.rating && med.rating.toString() === cleanKw) || 
                                            (!isRatingSearch && med.rating && med.rating.toString() === kw);

                        return (med.name && med.name.toLowerCase().includes(kw)) ||
                               (med.effect && med.effect.toLowerCase().includes(kw)) ||
                               (med.type && med.type.toLowerCase().includes(kw)) ||
                               (med.location && med.location.toLowerCase().includes(kw)) ||
                               (med.notes && med.notes.toLowerCase().includes(kw)) ||
                               ratingMatch;
                    });
                });
            }

            return list;
        }

        function checkExpiryAlerts() {
            const snoozeSetting = localStorage.getItem('med_cabinet_alert_snooze');
            if (snoozeSetting && Date.now() < parseInt(snoozeSetting)) {
                return;
            }

            const container = document.getElementById('expiry-alert-list');
            container.innerHTML = '';
            let riskCount = 0;

            state.medicines.filter(m => !m.discarded).forEach(med => {
                if (!med.expiry) return;
                const [year, month] = med.expiry.split('-').map(Number);
                const remainingMonths = (year - currentYear) * 12 + (month - currentMonth);

                let label = "";
                let itemClass = "alert-item-row";
                let badgeStyle = "color: var(--accent-red); background: rgba(255,59,48,0.1);";

                if (remainingMonths < 0) {
                    label = "已过期";
                } else if (remainingMonths === 0) {
                    label = "本月到期";
                    itemClass = "alert-item-row warning";
                    badgeStyle = "color: var(--accent-orange); background: rgba(255,149,0,0.1);";
                } else if (remainingMonths === 1) {
                    label = "到期前一个月";
                    itemClass = "alert-item-row warning";
                    badgeStyle = "color: var(--accent-orange); background: rgba(255,149,0,0.1);";
                }

                if (label) {
                    riskCount++;
                    const row = document.createElement('div');
                    row.className = itemClass;
                    row.innerHTML = `
                        <div class="alert-item-info">
                            <h4>${med.name}</h4>
                            <p><i class="fa-solid fa-location-dot"></i> ${med.location || "未分类"}</p>
                        </div>
                        <span class="ai-safety-alert" style="${badgeStyle}">${label}</span>
                    `;
                    container.appendChild(row);
                }
            });

            if (riskCount > 0) {
                setTimeout(() => { openModal('expiry-alert-modal'); }, 800);
            }
        }

                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxDim = 600;
                        let w = img.width;
                        let h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
                            else { w = Math.round((w * maxDim) / h); h = maxDim; }
                        }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        uploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        previewImg.src = uploadedImageBase64;
                        previewBox.style.display = 'block';
                        fileTrigger.style.display = 'none';
                    }
                };
                reader.readAsDataURL(file);

            const name = document.getElementById('med-name-input').value.trim();
            const type = document.getElementById('med-type-input').value;
            const effect = document.getElementById('med-effect-input').value.trim();
            const expiry = document.getElementById('med-expiry-input').value;
            const location = document.getElementById('med-location-input').value;
            const notes = document.getElementById('med-notes-input').value.trim();
            const rating = tempSelectedRating;

            if (!name) { showToast('请填写药品名称'); return; }
            if (!expiry) { showToast('请选择保质期/有效期'); return; }

            const targetDiscardState = false; 

            if (editingMedId) {
                const index = state.medicines.findIndex(m => m.id === editingMedId);
                if (index !== -1) {
                    state.medicines[index] = {
                        ...state.medicines[index],
                        name, type, effect, expiry, location, notes, rating,
                        discarded: targetDiscardState,
                        photo: uploadedImageBase64
                    };
                    showToast('药品信息已保存');
                }
                editingMedId = null;
            } else {
                const newMedicine = {
                    id: Date.now().toString(),
                    name, type, effect, expiry, location, notes, rating,
                    discarded: targetDiscardState,
                    photo: uploadedImageBase64
                };
                state.medicines.unshift(newMedicine);
                showToast('新药品已入库');
            }

            saveStateToLocal();
            closeModal('add-medicine-modal');
            
            document.getElementById('btn-open-archive').classList.remove('active');
            document.getElementById('archive-banner').style.display = 'none';
            currentFilterLocation = "全部";

            refreshUI();

            document.getElementById('med-name-input').value = '';
            document.getElementById('med-effect-input').value = '';
            document.getElementById('med-expiry-input').value = '';
            document.getElementById('med-notes-input').value = '';
            setFormRatingState(0);
            uploadedImageBase64 = null;
            previewBox.style.display = 'none';
            fileTrigger.style.display = 'flex';
            fileInput.value = '';
        };

        const symptomDictionary = {
            "感冒": ["感冒", "发热", "发烧", "头痛", "鼻塞", "流涕", "打喷嚏", "咳嗽", "咳", "祛痰", "退烧", "冷", "寒", "柴胡", "999", "退热"],
            "消炎": ["消炎", "阿莫西林", "头孢", "头孢拉丁", "发炎", "细菌", "抗生素", "红肿"],
            "过敏": ["过敏", "红疹", "荨麻疹", "依巴斯汀", "抗组胺", "痒"],
            "痤疮": ["痤疮", "痘", "米诺环素", "多西环素", "青春痘", "粉刺"],
            "止痛": ["痛", "头痛", "牙痛", "关节痛", "痛经", "艾瑞昔布", "消炎镇痛"],
            "疱疹": ["疱疹", "阿昔洛韦", "单纯疱疹", "病毒"],
            "肠胃": ["拉肚子", "腹泻", "胀气", "胃", "肠", "整肠生", "肚子疼", "稀", "菌群"]
        };

        document.getElementById('btn-open-ai').onclick = () => { openModal('ai-assistant-overlay'); };

        window.askAIPreset = function(presetText) {
            document.getElementById('ai-user-input').value = presetText;
            triggerAISubmit();
        };

        document.getElementById('btn-send-ai-query').onclick = triggerAISubmit;
        document.getElementById('ai-user-input').onkeydown = (e) => { if (e.key === 'Enter') triggerAISubmit(); };

        function triggerAISubmit() {
            const inputField = document.getElementById('ai-user-input');
            const query = inputField.value.trim();
            if (!query) return;

            document.getElementById('ai-presets-box').style.display = 'none';
            document.getElementById('ai-init-msg').style.display = 'none';
            
            const logContainer = document.getElementById('ai-conversation-log');
            logContainer.style.display = 'flex';

            const userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble user';
            userMsg.innerText = query;
            logContainer.appendChild(userMsg);
            
            inputField.value = '';
            scrollAIChatToBottom();

            const aiLoadingMsg = document.createElement('div');
            aiLoadingMsg.className = 'chat-bubble ai';
            aiLoadingMsg.innerHTML = `
                <div style="font-size:11px; color:var(--text-secondary); margin-bottom:4px;">AI 正在分析您症状并检索药箱中...</div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            logContainer.appendChild(aiLoadingMsg);
            scrollAIChatToBottom();

            setTimeout(() => {
                const responseData = generateLocalAIReport(query);
                aiLoadingMsg.innerHTML = responseData;
                scrollAIChatToBottom();
            }, 1200);
        }

        function generateLocalAIReport(userQuery) {
            const queryLower = userQuery.toLowerCase();
            let identifiedSymptoms = [];
            let matchedMeds = [];

            for (let category in symptomDictionary) {
                const keywords = symptomDictionary[category];
                if (keywords.some(kw => queryLower.includes(kw))) {
                    identifiedSymptoms.push(category);
                }
            }

            if (identifiedSymptoms.length === 0) { identifiedSymptoms = ["通用匹配"]; }

            state.medicines.filter(m => !m.discarded).forEach(med => {
                let score = 0;
                const medName = (med.name || "").toLowerCase();
                const medEffect = (med.effect || "").toLowerCase();
                const medNotes = (med.notes || "").toLowerCase();

                identifiedSymptoms.forEach(symptom => {
                    if (symptom !== "通用匹配" && symptomDictionary[symptom]) {
                        symptomDictionary[symptom].forEach(alias => {
                            if (medName.includes(alias) || medEffect.includes(alias) || medNotes.includes(alias)) {
                                score += 3;
                            }
                        });
                    }
                });

                if (queryLower.includes(medName) || medEffect.split(/[,，、\s]/).some(eff => eff && queryLower.includes(eff))) {
                    score += 5;
                }

                if (score > 0) { matchedMeds.push({ med, score }); }
            });

            matchedMeds.sort((a, b) => b.score - a.score);

            let reportHtml = ``;
            
            if (identifiedSymptoms.includes("通用匹配") && matchedMeds.length === 0) {
                reportHtml += `
                    <div style="font-weight:600; color:var(--accent-orange);"><i class="fa-solid fa-triangle-exclamation"></i> 抱歉，未能自动识别到对症标签</div>
                    <p style="margin-top:4px; font-size:12px; color:var(--text-secondary);">我没能在您的药箱中找到与您的描述明显对症的药。建议您在主页直接通过【搜索框】模糊检索，或直接去正规药店咨询专业医生。</p>
                `;
            } else {
                reportHtml += `
                    <div style="font-weight:600; color:#bf5af2;"><i class="fa-solid fa-circle-check"></i> 诊断分析报告</div>
                    <p style="margin-top:2px; font-size:12px;">分析您的诉求，为您在药箱中筛选出以下对症存药：</p>
                    <div class="ai-report-section">
                `;

                if (matchedMeds.length === 0) {
                    reportHtml += `
                        <p style="font-size:12px; color:var(--text-secondary);"><i class="fa-solid fa-box-open"></i> 当前药箱里暂无直接对症的有效药，建议您及时去实体药店采购相关抗感冒/消炎类的药物。</p>
                    `;
                } else {
                    matchedMeds.forEach(item => {
                        const m = item.med;
                        const status = getExpiryStatus(m.expiry, false);
                        
                        let warningTag = "";
                        if (status.statusClass === 'status-expired') {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(255,59,48,0.1); color:var(--accent-red);"><i class="fa-solid fa-ban"></i> 严禁服用（已过期）</span>`;
                        } else if (status.statusClass === 'status-warning') {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(255,149,0,0.1); color:var(--accent-orange);"><i class="fa-solid fa-clock"></i> 临近过期（尽快用）</span>`;
                        } else {
                            warningTag = `<span class="ai-safety-alert" style="background:rgba(52,199,89,0.1); color:var(--accent-green);"><i class="fa-solid fa-shield-halved"></i> 安全在保</span>`;
                        }

                        let aiRatingString = m.rating ? ` | 评分：<b>${'⭐'.repeat(m.rating)}</b>` : '';
                        let aiNotesBlock = m.notes ? `<p style="margin-top: 4px; font-size:11px; color:#bf5af2; background:rgba(191, 90, 242, 0.05); padding: 4px 8px; border-radius: 4px;"><b>💡 用药提示：</b>${m.notes}</p>` : '';

                        reportHtml += `
                            <div class="ai-med-recommend" style="display:block;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div>
                                        <h4 style="font-size:13px; font-weight:600;">${m.name}</h4>
                                        <p style="font-size:11px; color:var(--text-secondary); margin-top:1px;"><i class="fa-solid fa-location-dot"></i> 存放在：<b>${m.location}</b>${aiRatingString}</p>
                                    </div>
                                    <div>${warningTag}</div>
                                </div>
                                ${aiNotesBlock}
                            </div>
                        `;
                    });
                }

                reportHtml += `
                    </div>
                    <div style="margin-top:10px; font-size:11px; color:var(--text-secondary); line-height:1.4; border-top:1px solid var(--border-color); padding-top:8px;">
                        <i class="fa-solid fa-circle-info"></i> <b>用药安全指南：</b>
                        消炎药与中药感冒冲剂请勿随意叠加。服用前请仔细核对包装说明书中的剂量。若症状持续未见改善，请务必立刻前往医院就诊。
                    </div>
                `;
            }

            return reportHtml;
        }

        function scrollAIChatToBottom() {
            const chatBody = document.getElementById('ai-chat-body');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        window.openModal = function(id) { document.getElementById(id).classList.add('active'); };
        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };

        document.getElementById('btn-open-add-modal').onclick = () => {
            editingMedId = null;
            document.getElementById('modal-title-text').innerText = '添加药品信息';
            
            document.getElementById('med-name-input').value = '';
            document.getElementById('med-effect-input').value = '';
            document.getElementById('med-expiry-input').value = '';
            document.getElementById('med-notes-input').value = '';
            setFormRatingState(0);
            uploadedImageBase64 = null;
            previewBox.style.display = 'none';
            fileTrigger.style.display = 'flex';
            fileInput.value = '';

            openModal('add-medicine-modal');
        };

        document.getElementById('btn-open-param-modal').onclick = () => {
            renderParamsList();
            openModal('manage-parameters-modal');
        };

        // Initialize UI view and active watchguards
        refreshUI();
        checkExpiryAlerts(); 
    </script>
</body>
</html>
